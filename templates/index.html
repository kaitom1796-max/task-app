{% extends "base.html" %}

{% block content %}

<h2>タスク管理</h2>

<form method="get">

<input
class="form-control mb-3"
name="search"
value="{{search}}"
placeholder="検索">

</form>

<form action="/add" method="post">

<div class="input-group mb-3">

<input
class="form-control"
name="task"
placeholder="タスク">

<button
class="btn btn-primary">
追加
</button>

</div>

</form>

<ul class="list-group">

{% for task in tasks %}

<li class="list-group-item d-flex justify-content-between">

{{task.text}}

<a
class="btn btn-danger btn-sm"
href="/delete/{{task.id}}">
削除
</a>

</li>

{% endfor %}

</ul>

<nav class="mt-3">

<ul class="pagination">

{% for p in range(1,total_pages+1) %}

<li class="page-item">

<a
class="page-link"
href="?page={{p}}&search={{search}}">

{{p}}

</a>

</li>

{% endfor %}

</ul>

</nav>

<a href="/logout" class="btn btn-secondary">
ログアウト
</a>

{% endblock %}
