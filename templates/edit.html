{% extends "base.html" %}

{% block content %}
<h2>タスクの編集</h2>

<form method="post" class="card card-body">
    <div class="mb-3">
        <label class="form-label">タスク名</label>
        <input class="form-control" name="task" value="{{ task.text }}" required>
    </div>
    <div class="mb-3">
        <label class="form-label">期限</label>
        <input type="date" class="form-control" name="due_date" value="{{ task.due_date }}">
    </div>
    <div class="mb-3">
        <label class="form-label">優先度</label>
        <select class="form-select" name="priority">
            <option value="高" {% if task.priority == '高' %}selected{% endif %}>高</option>
            <option value="中" {% if task.priority == '中' %}selected{% endif %}>中</option>
            <option value="低" {% if task.priority == '低' %}selected{% endif %}>低</option>
        </select>
    </div>
    <div>
        <button class="btn btn-success">更新する</button>
        <a href="/" class="btn btn-secondary">キャンセル</a>
    </div>
</form>
{% endblock %}
