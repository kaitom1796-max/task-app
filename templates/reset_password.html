{% extends "base.html" %}

{% block content %}
<h2>パスワードリセット</h2>
<p class="text-muted">ユーザー名を検証し、新しいパスワードを設定します。</p>
<form method="post">
    <input class="form-control mb-2" name="username" placeholder="確認用ユーザー名" required>
    <input class="form-control mb-2" type="password" name="password" placeholder="新しいパスワード (6文字以上)" required>
    <button class="btn btn-danger">パスワードを更新</button>
    <a href="/login" class="btn btn-secondary">ログイン画面へ戻る</a>
</form>
{% endblock %}
