{% extends "base.html" %}

{% block content %}

<h2>ログイン</h2>

<form method="post">

<input
class="form-control mb-2"
name="username"
placeholder="ユーザー名">

<input
class="form-control mb-2"
type="password"
name="password"
placeholder="パスワード">

<button class="btn btn-primary">
ログイン
</button>

<a href="/register"
class="btn btn-secondary">
新規登録
</a>

</form>

{% endblock %}
