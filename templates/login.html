{% extends "base.html" %}

{% block content %}
<h2>ログイン</h2>
<form method="post" class="mb-3">
    <input class="form-control mb-2" name="username" placeholder="ユーザー名" required>
    <input class="form-control mb-2" type="password" name="password" placeholder="パスワード" required>
    <button class="btn btn-primary">ログイン</button>
    <a href="/register" class="btn btn-secondary">新規登録</a>
</form>
<hr>
<p>パスワードをお忘れですか？ <a href="/reset_password">パスワードリセット</a></p>
{% endblock %}
