name: Flask ToDo App CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: コードのチェックアウト
      uses: actions/checkout@v4

    - name: Pythonのセットアップ
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 依存関係のインストール
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 自動テストの実行 (pytest)
      run: |
        pytest test_app.py

  build-docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - name: コードのチェックアウト
      uses: actions/checkout@v4

    - name: Docker Buildxのセットアップ
      uses: docker/setup-buildx-action@v3

    - name: Dockerイメージのビルドテスト
      run: |
        docker build -t todo-app:latest .